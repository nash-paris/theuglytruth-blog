name: Sync Substack to blog

on:
  schedule:
    - cron: '0 7,19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 markdownify python-slugify Pillow

      - name: Run sync
        run: python3 scripts/sync-substack.py --source archive

      - name: Commit and push
        run: |
          git config user.name "theuglytruth-sync-bot"
          git config user.email "sync-bot@theuglytruth.fr"
          git add src/content/blog/ public/images/ scripts/.cache/ || true
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "chore(sync): nouvelles editions depuis Substack [skip ci]"
            git push
          fi
